<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Patient Notes</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f5; min-height: 100vh; }
.header { background: #fff; padding: 20px 16px 16px; border-bottom: 1px solid #e5e5e5; }
.header h1 { font-size: 22px; font-weight: 700; color: #1a1a1a; }
.header p { font-size: 13px; color: #888; margin-top: 3px; }
.search-box { margin: 16px; position: relative; }
.search-input { width: 100%; padding: 14px 16px 14px 44px; border: 1.5px solid #e5e5e5; border-radius: 12px; font-size: 16px; background: #fff; outline: none; -webkit-appearance: none; }
.search-input:focus { border-color: #3b82f6; }
.search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); font-size: 18px; color: #aaa; pointer-events: none; }
.status-bar { margin: 0 16px 16px; background: #fff; border-radius: 12px; padding: 12px 16px; border: 1px solid #e5e5e5; display: flex; align-items: center; gap: 10px; }
.dot { width: 10px; height: 10px; border-radius: 50%; background: #ccc; flex-shrink: 0; transition: background 0.3s; }
.dot.selected { background: #3b82f6; }
.dot.saved { background: #22c55e; }
.status-text { font-size: 14px; color: #555; }
.status-name { font-weight: 600; color: #3b82f6; }
.section-label { font-size: 11px; font-weight: 600; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; padding: 0 16px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.reload-link { color: #3b82f6; cursor: pointer; text-transform: none; letter-spacing: 0; font-weight: 600; }
.patient-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }
.patient-card { background: #fff; border: 1.5px solid #e5e5e5; border-radius: 14px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: all 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
.patient-card:active { transform: scale(0.98); background: #f8f8f8; }
.patient-card.selected { border-color: #3b82f6; background: #eff6ff; }
.avatar { width: 42px; height: 42px; border-radius: 50%; background: #f0f0f0; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; color: #666; flex-shrink: 0; }
.patient-card.selected .avatar { background: #dbeafe; color: #1d4ed8; }
.patient-name { font-size: 16px; font-weight: 500; color: #1a1a1a; }
.check { font-size: 20px; color: #3b82f6; opacity: 0; margin-left: auto; flex-shrink: 0; }
.patient-card.selected .check { opacity: 1; }
.confirm-btn { display: none; margin: 20px 16px; padding: 16px; border-radius: 14px; background: #3b82f6; border: none; color: #fff; font-size: 16px; font-weight: 600; cursor: pointer; width: calc(100% - 32px); }
.confirm-btn.visible { display: block; }
.confirm-btn:active { background: #2563eb; }
.confirm-btn:disabled { opacity: 0.6; }
.done-state { display: none; text-align: center; padding: 60px 24px; }
.done-state.visible { display: block; }
.done-icon { font-size: 64px; margin-bottom: 16px; }
.done-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
.done-sub { font-size: 15px; color: #666; line-height: 1.5; margin-bottom: 32px; }
.reset-btn { font-size: 15px; color: #3b82f6; background: none; border: none; cursor: pointer; padding: 8px; }
.add-new-btn { margin: 12px 16px 0; padding: 14px 16px; border-radius: 12px; background: #f0f7ff; border: 1.5px dashed #3b82f6; color: #3b82f6; font-size: 15px; font-weight: 500; cursor: pointer; width: calc(100% - 32px); display: none; }
.add-new-btn.visible { display: block; }
.notice { margin: 0 16px 16px; padding: 12px 14px; border-radius: 12px; font-size: 13px; line-height: 1.4; display: none; }
.notice.visible { display: block; }
.notice.info { background: #f0f0f0; color: #666; }
.notice.warn { background: #fff4e5; color: #92400e; border: 1px solid #fde2b8; }
.muted { padding: 24px 16px; text-align: center; color: #aaa; font-size: 14px; }
.held-banner { margin: 0 16px 16px; background: #fff4e5; border: 1.5px solid #f59e0b; border-radius: 12px; padding: 14px 16px; display: none; }
.held-banner.visible { display: block; }
.held-head { font-size: 15px; font-weight: 700; color: #92400e; display: flex; align-items: center; gap: 8px; }
.held-sub { font-size: 12.5px; color: #b45309; margin-top: 4px; line-height: 1.4; }
.held-item { background: #fff; border: 1px solid #fde2b8; border-radius: 10px; padding: 10px 12px; margin-top: 10px; }
.held-note-title { font-size: 13.5px; font-weight: 600; color: #1a1a1a; }
.held-note-preview { font-size: 12px; color: #777; margin-top: 3px; line-height: 1.35; max-height: 52px; overflow: hidden; }
.held-controls { display: flex; gap: 8px; margin-top: 10px; }
.held-daylabel { font-size: 11.5px; color: #b45309; margin-top: 8px; font-weight: 600; }
.held-search { width: 100%; padding: 10px 12px; border: 1.5px solid #e5e5e5; border-radius: 10px; font-size: 14px; background: #fff; outline: none; -webkit-appearance: none; }
.held-search:focus { border-color: #f59e0b; }
.held-select { flex: 1; min-width: 0; padding: 10px; border: 1.5px solid #e5e5e5; border-radius: 10px; font-size: 14px; background: #fff; }
.held-file-btn { padding: 10px 16px; border: none; border-radius: 10px; background: #f59e0b; color: #fff; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
.held-file-btn:disabled { opacity: 0.6; }
</style>
</head>
<body>

<div id="main-view">
  <div class="header">
    <h1>Patient Notes</h1>
    <p id="date-display"></p>
  </div>

  <div class="search-box">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="Search any patient..." autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Tap a patient before recording</span>
  </div>

  <div class="held-banner" id="held-banner"></div>

  <div class="notice" id="notice"></div>

  <div class="section-label" id="section-label">
    <span id="section-label-text">Today's schedule</span>
    <span class="reload-link" id="reload-link" onclick="loadSchedule()">Reload</span>
  </div>
  <div class="patient-list" id="patient-list"></div>
  <button class="add-new-btn" id="add-new-btn" onclick="addManualPatient()"></button>
  <button class="confirm-btn" id="confirm-btn" onclick="confirmPatient()">✓ Ready — start recording now</button>
</div>

<div class="done-state" id="done-state">
  <div class="done-icon">✅</div>
  <div class="done-title" id="done-title">Ready to record</div>
  <div class="done-sub" id="done-sub">Note will upload automatically when Plaud syncs.</div>
  <button class="reset-btn" onclick="reset()">← Back to patient list</button>
</div>

<script>
let selectedPatient = null;   // { id, name }
let todaysPatients = [];      // [{ id, name }] from DrChrono
let heldNotes = [];           // [{ at, title, candidate, preview, scheduleError }] awaiting manual filing

const el = (id) => document.getElementById(id);
el('date-display').textContent = new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });

function initials(name) {
  return name.split(' ').filter(Boolean).map(n => n[0]).join('').slice(0, 2).toUpperCase();
}

function titleCase(str) {
  return str.replace(/\w\S*/g, t => t.charAt(0).toUpperCase() + t.substr(1).toLowerCase());
}

function showNotice(msg, kind) {
  const n = el('notice');
  n.textContent = msg;
  n.className = 'notice visible ' + (kind || 'info');
}
function hideNotice() { el('notice').className = 'notice'; }

function renderList(patients) {
  const list = el('patient-list');
  list.innerHTML = '';
  if (!patients.length) {
    list.innerHTML = '<div class="muted">No matching patients.</div>';
    return;
  }
  patients.forEach((p) => {
    const card = document.createElement('div');
    const isSel = selectedPatient && selectedPatient.id === p.id && selectedPatient.name === p.name;
    card.className = 'patient-card' + (isSel ? ' selected' : '');
    card.onclick = () => selectPatient(p);
    card.innerHTML =
      '<div class="avatar">' + initials(p.name) + '</div>' +
      '<div class="patient-name">' + p.name + '</div>' +
      '<span class="check">✓</span>';
    list.appendChild(card);
  });
}

function filtered() {
  const q = el('search-input').value.toLowerCase().trim();
  if (!q) return todaysPatients;
  return todaysPatients.filter(p => p.name.toLowerCase().includes(q));
}

let rosterTimer = null;
function search() {
  const q = el('search-input').value.trim();
  const todayHits = filtered();
  renderList(todayHits);
  el('add-new-btn').classList.remove('visible');
  clearTimeout(rosterTimer);
  if (!q) { el('section-label-text').textContent = "Today's schedule"; return; }
  el('section-label-text').textContent = todayHits.length
    ? 'Matching patients'
    : (q.length >= 2 ? 'Searching all patients…' : 'No matches yet');
  // Today's list is instant. For anything not on today's schedule, search the full
  // roster so any patient is findable from this one box (debounced).
  if (q.length >= 2) rosterTimer = setTimeout(() => searchAllPatients(q, todayHits), 300);
}

// Merge today's matches with full-roster matches and render them all as tappable
// cards. Shows a clear result / empty / error state instead of silently doing nothing.
async function searchAllPatients(q, todayHits) {
  try {
    const r = await fetch('/api/patients/search?q=' + encodeURIComponent(q));
    if (el('search-input').value.trim() !== q) return; // a newer keystroke won
    if (!r.ok) { el('section-label-text').textContent = "Couldn't search patients — tap Reload"; return; }
    const data = await r.json();
    const seen = new Set(todayHits.map(p => String(p.id)));
    const merged = todayHits.concat((data.patients || []).filter(p => !seen.has(String(p.id))));
    renderList(merged);
    el('section-label-text').textContent = merged.length ? 'Matching patients' : 'No patient found';
    // Only offer the name-only record when the ENTIRE roster has no match.
    const addBtn = el('add-new-btn');
    if (!merged.length) {
      addBtn.textContent = '+ Use "' + titleCase(q) + '" (name only, no chart match)';
      addBtn.classList.add('visible');
    } else {
      addBtn.classList.remove('visible');
    }
  } catch (e) {
    if (el('search-input').value.trim() === q) el('section-label-text').textContent = "Couldn't search — check connection";
  }
}

async function loadSchedule() {
  hideNotice();
  el('section-label-text').textContent = "Today's schedule";
  el('patient-list').innerHTML = '<div class="muted">Loading today\'s schedule…</div>';
  try {
    const r = await fetch('/api/today');
    if (!r.ok) throw new Error('status ' + r.status);
    const data = await r.json();
    todaysPatients = (data.patients || []);
    if (!todaysPatients.length) {
      showNotice("No patients on today's schedule yet. Add one in DrChrono, then tap Reload. You can also search a name to record without a chart match.", 'info');
    }
    search();
    renderHeld(); // patient dropdowns in the held banner now have today's list
  } catch (e) {
    todaysPatients = [];
    el('patient-list').innerHTML = '';
    showNotice("Couldn't load today's schedule. Tap Reload to retry, or search a name to record without a chart match.", 'warn');
  }
}

function selectPatient(p) {
  selectedPatient = p;
  el('status-dot').className = 'dot selected';
  el('status-text').innerHTML = 'Selected: <span class="status-name">' + p.name + '</span>';
  el('confirm-btn').classList.add('visible');
  renderList(filtered());
}

function addManualPatient() {
  const q = el('search-input').value.trim();
  if (!q) return;
  selectPatient({ id: null, name: titleCase(q) });
}

async function confirmPatient() {
  if (!selectedPatient) return;
  const btn = el('confirm-btn');
  btn.textContent = 'Saving…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/select', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ id: selectedPatient.id, name: selectedPatient.name }),
    });
    if (!r.ok) throw new Error('status ' + r.status);
  } catch (e) {
    btn.textContent = 'Could not save — tap to retry';
    btn.disabled = false;
    return;
  }

  el('main-view').style.display = 'none';
  el('done-state').classList.add('visible');
  el('done-title').textContent = 'Ready for ' + selectedPatient.name;
  const idNote = selectedPatient.id ? '' : ' (matched by name only)';
  el('done-sub').textContent = selectedPatient.name + ' is selected' + idNote + '. Start your Plaud recording now, the note will upload to DrChrono automatically.';
  el('status-dot').className = 'dot saved';
}

function reset() {
  selectedPatient = null;
  el('main-view').style.display = 'block';
  el('done-state').classList.remove('visible');
  el('confirm-btn').classList.remove('visible');
  el('confirm-btn').textContent = '✓ Ready — start recording now';
  el('confirm-btn').disabled = false;
  el('status-dot').className = 'dot';
  el('status-text').textContent = 'Tap a patient before recording';
  el('search-input').value = '';
  el('add-new-btn').classList.remove('visible');
  search();
}

function esc(s) {
  return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

function patientOptions() {
  return todaysPatients.map(p =>
    '<option value="' + esc(p.id) + '" data-name="' + esc(p.name) + '">' + esc(p.name) + '</option>').join('');
}

// The notification: a banner listing any note that couldn't be auto-matched, each
// with a patient picker + File button, so a stuck note is a one-tap fix right here.
function renderHeld() {
  const b = el('held-banner');
  if (!heldNotes.length) { b.className = 'held-banner'; b.innerHTML = ''; return; }
  const n = heldNotes.length;
  let html = '<div class="held-head">⚠️ ' + n + ' note' + (n > 1 ? 's' : '') + ' need filing</div>' +
    '<div class="held-sub">These could not be auto-matched to a patient (nothing was put on a wrong chart). Pick the patient and tap File.</div>';
  heldNotes.forEach((h, i) => {
    const heard = h.candidate ? 'Heard: "' + esc(h.candidate) + '"'
      : (h.scheduleError ? 'Schedule lookup failed' : 'No name detected');
    const body = h.preview || h.note || '';
    const dateLabel = h.noteDate ? 'From ' + esc(h.noteDate) + ' schedule' : "From the schedule";
    html += '<div class="held-item">' +
      '<div class="held-note-title">' + esc(h.title || 'Plaud note') + '</div>' +
      '<div class="held-note-preview">' + heard + (body ? ' — ' + esc(body) : '') + '</div>' +
      '<div class="held-daylabel" id="held-day-' + i + '">' + dateLabel + '</div>' +
      '<div class="held-controls">' +
        '<select class="held-select" id="held-sel-' + i + '"><option value="">Loading…</option></select>' +
        '<button class="held-file-btn" id="held-btn-' + i + '" onclick="fileHeld(' + i + ')">File</button>' +
      '</div>' +
      '<div class="held-controls">' +
        '<input class="held-search" id="held-q-' + i + '" placeholder="Not there? search all patients…" autocomplete="off" autocorrect="off" spellcheck="false" oninput="searchHeldPatients(' + i + ')">' +
      '</div></div>';
  });
  b.innerHTML = html;
  b.className = 'held-banner visible';
  // Populate each picker from the day the note was recorded, then pre-select the
  // patient the name points to so filing is usually one tap.
  heldNotes.forEach((h, i) => loadHeldDay(i, h.noteDate, h.candidate));
}

function optionsHtml(patients) {
  return ['<option value="">Select patient…</option>'].concat(
    patients.map(p => '<option value="' + esc(p.id) + '" data-name="' + esc(p.name) + '">' + esc(p.name) + '</option>')
  ).join('');
}

function normC(s) { return String(s || '').toLowerCase().replace(/[^a-z\s]/g, ' ').replace(/\s+/g, ' ').trim(); }

// Pick the scheduled patient a suggested name most likely refers to. Only returns a
// confident single match; tolerates Plaud's spelling ("Augustine" vs "Augustin").
function bestOption(cand, patients) {
  const c = normC(cand); if (!c) return null;
  const exact = patients.find(p => normC(p.name) === c); if (exact) return exact;
  const contains = patients.find(p => { const n = normC(p.name); return n.includes(c) || c.includes(n); }); if (contains) return contains;
  const cf = c.split(' ')[0], cl = c.split(' ').pop();
  const firstHits = patients.filter(p => normC(p.name).split(' ')[0] === cf);
  if (firstHits.length === 1) return firstHits[0];
  const fuzzy = patients.find(p => { const parts = normC(p.name).split(' '); return parts[0] === cf && parts[parts.length - 1].slice(0, 4) === cl.slice(0, 4); });
  return fuzzy || null;
}

const heldDaySchedules = {}; // i -> [{id,name}] merged pool (note-day + today) for the picker
async function loadHeldDay(i, date, candidate) {
  const sel = el('held-sel-' + i);
  if (!sel) return;
  // Fetch this note's own-day schedule (one quick retry for a transient empty),
  // then MERGE with today's already-loaded schedule so the picker is never blank.
  let day = [];
  for (let attempt = 0; attempt < 2; attempt++) {
    try {
      const r = await fetch('/api/schedule?date=' + encodeURIComponent(date || ''));
      if (r.ok) { const d = await r.json(); day = d.patients || []; if (day.length) break; }
    } catch (e) { /* retry */ }
  }
  const map = new Map();
  [...day, ...(todaysPatients || [])].forEach(p => { if (p && p.id != null) map.set(String(p.id), p); });
  const patients = [...map.values()].sort((a, b) => a.name.localeCompare(b.name));
  heldDaySchedules[i] = patients;
  const lbl = el('held-day-' + i);
  if (!patients.length) {
    sel.innerHTML = '<option value="">Select patient…</option>';
    if (lbl) lbl.textContent = "No schedule loaded — type a name below to search.";
    return;
  }
  if (lbl) lbl.textContent = day.length
    ? ('From ' + esc(date) + " + today's schedule")
    : "That day's list was empty — showing today's, or search below.";
  sel.innerHTML = optionsHtml(patients);
  const best = bestOption(candidate, patients);
  if (best) {
    const opt = Array.from(sel.options).find(o => o.value === String(best.id));
    if (opt) opt.selected = true;
  }
}

const heldTimers = {};
// Fallback only: search the whole roster for a note whose patient was not on that
// day's schedule. Empty query restores that day's schedule list.
async function searchHeldPatients(i) {
  const inp = el('held-q-' + i);
  const sel = el('held-sel-' + i);
  const lbl = el('held-day-' + i);
  if (!inp || !sel) return;
  const q = inp.value.trim();
  clearTimeout(heldTimers[i]);
  if (q.length < 2) {
    sel.innerHTML = optionsHtml(heldDaySchedules[i] || []);
    if (lbl) lbl.textContent = "That day's list was empty — showing today's, or search above.";
    return;
  }
  if (lbl) lbl.textContent = 'Searching all patients…';
  heldTimers[i] = setTimeout(async () => {
    try {
      const r = await fetch('/api/patients/search?q=' + encodeURIComponent(q));
      if (inp.value.trim() !== q) return; // superseded by a newer keystroke
      if (!r.ok) { if (lbl) lbl.textContent = "Couldn't search — try again."; return; }
      const data = await r.json();
      const found = data.patients || [];
      sel.innerHTML = optionsHtml(found);
      if (found.length === 1) sel.selectedIndex = 1;
      if (lbl) lbl.textContent = found.length
        ? (found.length + ' patient' + (found.length > 1 ? 's' : '') + ' found — pick from the dropdown ↑')
        : 'No patient found for "' + q + '".';
    } catch (e) { if (lbl) lbl.textContent = "Couldn't search — check connection."; }
  }, 300);
}

async function loadHeld() {
  try {
    const r = await fetch('/api/held');
    if (!r.ok) return;
    const data = await r.json();
    heldNotes = data.held || [];
    renderHeld();
  } catch (e) { /* non-fatal: the banner just won't show this cycle */ }
}

async function fileHeld(i) {
  const sel = el('held-sel-' + i);
  const btn = el('held-btn-' + i);
  if (!sel || !btn) return;
  const pid = sel.value;
  if (!pid) { sel.focus(); return; }
  const pname = sel.options[sel.selectedIndex].getAttribute('data-name');
  const at = heldNotes[i] && heldNotes[i].at;
  btn.textContent = '…'; btn.disabled = true;
  try {
    const r = await fetch('/api/file-held', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ at: at, patientId: pid, patientName: pname }),
    });
    if (!r.ok) throw new Error('status ' + r.status);
    await loadHeld(); // reload so indices/list stay in sync after removal
  } catch (e) {
    btn.textContent = 'Retry'; btn.disabled = false;
  }
}

el('search-input').addEventListener('input', search);
loadSchedule();
loadHeld();
setInterval(loadHeld, 60000); // surface newly-held notes without a manual reload
</script>
</body>
</html>
